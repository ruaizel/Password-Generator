<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Password Generator 🔐</h2>

        <!-- Password Display -->
        <input type="text" id="password" placeholder="Your password" readonly>
        <button onclick="copyPassword()">Copy</button>

        <!-- Length -->
        <div class="option">
            <label>Password Length:</label>
            <input type="number" id="length" min="8" max="20" value="12">
        </div>

        <!-- Options -->
        <div class="option">
            <input type="checkbox" id="uppercase" checked> Uppercase (A-Z)
        </div>
        <div class="option">
            <input type="checkbox" id="lowercase" checked> Lowercase (a-z)
        </div>
        <div class="option">
            <input type="checkbox" id="numbers" checked> Numbers (0-9)
        </div>
        <div class="option">
            <input type="checkbox" id="symbols"> Symbols (!@#$)
        </div>

        <!-- Generate -->
        <button class="generate" onclick="generatePassword()">Generate Password</button>

        <!-- Strength -->
        <p id="strength">Strength: </p>
    </div>

    <script src="script.js"></script>
</body>

</html>
